name: Bug Report
description: Report a bug or unexpected behavior in dbportal
title: "[BUG]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below as completely as possible.
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe what happened...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we make this bug happen again?
      placeholder: |
        1. Start dbportal
        2. Click on...
        3. See error...
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: dropdown
    id: database
    attributes:
      label: Database Type
      description: Which database were you connecting to when the bug occurred?
      options:
        - PostgreSQL
        - MongoDB
        - MySQL / MariaDB
        - SQLite
        - SQL Server
        - Redis
        - N/A (General UI bug)
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: dbportal version
      description: Run `npx dbportal --version` or check package.json
      placeholder: e.g. 1.0.3
  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Paste any console errors or terminal output here.
      render: shell
  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched for existing issues and this is not a duplicate.
          required: true
        - label: I have redacted any sensitive credentials in my logs/config.
          required: true
